<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการแข่ง - NeXi-Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stats.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>สถิติการเล่นของคุณ</h1>
            <p>อัปเดตแบบเรียลไทม์จากระบบฐานข้อมูล</p>
            <button id="clearBtn" class="clear-btn">ล้างข้อมูล</button>
        </header>

        <section class="summary-cards">
            <div class="card">
                <div class="card-icon">🎯</div>
                <h3>จำนวนคิลสะสม</h3>
                <p id="totalKills" class="stat-value">0</p>
            </div>
            <div class="card">
                <div class="card-icon">💀</div>
                <h3>การตายสะสม</h3>
                <p id="totalDeaths" class="stat-value">0</p>
            </div>
            <div class="card">
                <div class="card-icon">📈</div>
                <h3>K/D Ratio</h3>
                <p id="kdRatio" class="stat-value">0.00</p>
            </div>
            <div class="card">
                <div class="card-icon">⭐</div>
                <h3>คะแนนรวม</h3>
                <p id="totalScore" class="stat-value">0</p>
            </div>
        </section>

        <section class="match-history">
            <h2>ประวัติการแข่งล่าสุด</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>วัน/เวลา</th>
                            <th>ผลลัพธ์</th>
                            <th>คิล</th>
                            <th>ตาย</th>
                            <th>แอสซิสต์</th>
                            <th>เฮดช็อต</th>
                            <th>คะแนน</th>
                        </tr>
                    </thead>
                    <tbody id="matchTableBody">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="stats.js"></script>
</body>
</html>
